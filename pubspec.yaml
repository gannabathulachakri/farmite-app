name: farmitre_flutter
description: "Farmitre - Agriculture Management App"
publish_to: 'none'

version: 1.0.1+2
environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  local_auth: ^2.3.0
  local_auth_android: ^1.0.36
  local_auth_darwin: ^1.1.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  share_plus: ^12.0.2
  lucide_icons_flutter: ^3.0.0
  uuid: ^4.5.3
  flutter_localizations:
    sdk: flutter
  pdf: ^3.11.3
  printing: ^5.14.3
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.5
  http: ^1.3.0
  webview_flutter: ^4.10.0
  razorpay_flutter: ^1.3.7
  google_sign_in: ^6.2.2
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_storage:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/fonts/
    - assets/fonts/NotoSansTelugu-Regular.ttf
    - assets/fonts/NotoSansTelugu-Bold.ttf

  fonts:
    - family: NotoSansTelugu
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
        - asset: assets/fonts/NotoSansTelugu-Bold.ttf
          weight: 700
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSansTelugu-Regular.ttf
